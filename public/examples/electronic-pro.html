<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luna Feral - Presskit Pro</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; color: #e2e8f0; background: linear-gradient(180deg, #020617, #0b1120); }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
      .card { border: 1px solid rgba(34,211,238,0.35); border-radius: 18px; overflow: hidden; background: rgba(15,23,42,0.75); }
      img { width: 100%; height: 360px; object-fit: cover; display: block; }
      .content { padding: 22px; }
      h1 { margin: 0 0 10px; font-size: 46px; }
      svg { width: 100%; height: 80px; margin-top: 12px; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <article class="card">
        <img src="https://images.unsplash.com/photo-1571330735066-03aaa9429d89?w=1600&h=900&fit=crop" alt="Portada electrónica" />
        <div class="content">
          <h1>Luna Feral</h1>
          <p>Presskit Pro futurista con enfoque en festivales, stage plot y requerimientos técnicos descargables.</p>
          <svg viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="70" y="14" width="160" height="46" stroke="#22d3ee" stroke-width="2" />
            <circle cx="150" cy="37" r="10" stroke="#22d3ee" stroke-width="2" />
            <path d="M 84 76 Q 150 95 216 76" stroke="#22d3ee" stroke-dasharray="5 5" />
          </svg>
        </div>
      </article>
    </main>
  </body>
</html>
