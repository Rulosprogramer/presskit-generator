<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Aura - Presskit Pro</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; color: #fff; background: radial-gradient(circle at 20% 20%, #ec4899, #4c1d95 50%, #0f172a); }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
      .card { backdrop-filter: blur(12px); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; overflow: hidden; }
      img { width: 100%; height: 380px; object-fit: cover; display: block; }
      .content { padding: 24px; }
      h1 { margin: 0 0 8px; font-size: 48px; }
      p { color: #e2e8f0; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <article class="card">
        <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=1600&h=900&fit=crop" alt="Portada indie" />
        <div class="content">
          <h1>Neon Aura</h1>
          <p>Presskit Pro para lanzamiento indie con visuales dinámicos, bio, streaming links y press photos.</p>
        </div>
      </article>
    </main>
  </body>
</html>
