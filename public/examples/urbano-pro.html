<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RZN - Presskit Pro</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; color: #fff; background: #06070a; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
      .hero { border: 1px solid #2c2f36; border-radius: 18px; overflow: hidden; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .grid img { width: 100%; height: 240px; object-fit: cover; display: block; }
      .content { padding: 20px; }
      h1 { margin: 0 0 6px; font-size: 58px; letter-spacing: -0.03em; }
      p { color: #a1a1aa; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <div class="grid">
          <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=900&h=700&fit=crop" alt="RZN live" />
          <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=900&h=700&fit=crop" alt="RZN stage" />
        </div>
        <div class="content">
          <h1>RZN</h1>
          <p>Presskit Pro brutalista para booking y prensa nacional. Incluye highlights visuales y narrativa de marca.</p>
        </div>
      </section>
    </main>
  </body>
</html>
